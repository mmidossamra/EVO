<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EVO Development - التصميم المعماري والتطوير العقاري</title>
    <link rel="icon" href="favicon.png" type="image/png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0f0f0f; color: #fff; overflow-x: hidden; }
        body.scroll-allowed { overflow-y: auto; }
        body.scroll-locked { overflow-y: hidden; }
        #intro-loader { display: none; }
        .volume-control-btn { position: absolute; top: 20px; right: 20px; z-index: 10000; background: rgba(255, 255, 255, 0.15); border: 1px solid rgba(255, 255, 255, 0.3); color: #fff; padding: 10px 15px; border-radius: 30px; font-size: 14px; cursor: pointer; backdrop-filter: blur(5px); display: flex; align-items: center; gap: 8px; transition: all 0.3s ease; }
        .main-background { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: url('bg.jpg'); background-size: cover; background-position: left center; background-repeat: no-repeat; z-index: 0; transition: transform 1.2s cubic-bezier(0.77, 0, 0.175, 1), filter 1.2s ease; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(10, 10, 10, 0.75); z-index: 1; transition: background 1.2s ease; }
        .gate-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; display: flex; flex-direction: column; justify-content: center; align-items: center; padding-left: 50%; transition: all 1.2s cubic-bezier(0.77, 0, 0.175, 1); }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .social-icons { display: flex; gap: 40px; margin-bottom: 30px; opacity: 0; }
        .gate-container.start-anim .social-icons { animation: fadeInUp 0.8s ease-out forwards; animation-delay: 0.2s; }
        .social-icons a { color: #ffffff; font-size: 32px; text-decoration: none; transition: color 0.3s ease, transform 0.3s ease; }
        .main-logo-wrapper { cursor: pointer; position: relative; opacity: 0; transition: transform 0.4s ease; }
        .gate-container.start-anim .main-logo-wrapper { animation: fadeInUp 0.8s ease-out forwards; animation-delay: 0.5s; }
        .main-logo { max-width: 420px; width: 100%; height: auto; display: block; transition: filter 0.3s ease; }
        .click-hint { color: rgba(255, 255, 255, 0.5); font-size: 13px; margin-top: 15px; letter-spacing: 2px; text-transform: uppercase; animation: pulse 2s infinite; font-weight: 300; }
        @keyframes pulse { 0% { opacity: 0.3; } 50% { opacity: 0.8; } 100% { opacity: 0.3; } }
        .gate-revealed .gate-container { transform: translateY(-100%); opacity: 0; pointer-events: none; }
        .gate-revealed .main-background { transform: scale(1.1); filter: blur(8px); }
        .gate-revealed .overlay { background: rgba(10, 10, 10, 0.9); }
        
        /* معرض الأعمال */
        .portfolio-section { position: relative; z-index: 5; max-width: 1200px; margin: 0 auto; padding: 140px 20px 60px 20px; opacity: 0; transform: translateY(40px); transition: all 1.2s cubic-bezier(0.215, 0.610, 0.355, 1); pointer-events: none; }
        .gate-revealed .portfolio-section { opacity: 1; transform: translateY(0); pointer-events: auto; }
        .section-header { text-align: center; margin-bottom: 60px; }
        .section-header h2 { font-size: 36px; font-weight: 400; letter-spacing: 2px; margin-bottom: 10px; }
        .section-header p { color: #888; font-size: 16px; }
        
        .projects-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 30px; }
        .project-card { background: #161616; border: 1px solid #222; border-radius: 8px; overflow: hidden; position: relative; aspect-ratio: 4 / 3; cursor: pointer; }
        .project-img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(30%); transition: transform 0.6s ease, filter 0.6s ease; }
        .project-info { position: absolute; bottom: 0; left: 0; width: 100%; padding: 25px; background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 100%); z-index: 2; }
        .project-info h4 { font-size: 20px; margin-bottom: 5px; text-transform: uppercase; }
        .project-info p { font-size: 13px; color: #aaa; }
        @media (hover: hover) { .project-card:hover .project-img { transform: scale(1.08); filter: grayscale(0%); } }

        /* 🌌 نافذة عرض المشروع الكامل (Project Modal) */
        .project-modal { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(5,5,5,0.95); z-index: 20000; display:flex; justify-content:center; align-items:center; opacity:0; pointer-events:none; transition: opacity 0.5s ease; backdrop-filter: blur(10px); }
        .project-modal.active { opacity:1; pointer-events:auto; }
        .modal-close-btn { position: absolute; top: 25px; right: 25px; color:#fff; font-size: 35px; cursor:pointer; background:none; border:none; transition: transform 0.3s; z-index: 21000; }
        .modal-close-btn:hover { transform: scale(1.2) rotate(90deg); }
        
        .modal-content { width: 90%; max-width: 1000px; display: flex; flex-direction: column; gap: 20px; position: relative; }
        .modal-text { text-align: center; }
        .modal-text h3 { font-size: 28px; font-weight: 500; margin-bottom: 8px; letter-spacing: 1px; }
        .modal-text p { color: #ccc; font-size: 15px; }

        /* الألبوم السلايدر */
        .slider-wrapper { position: relative; width: 100%; aspect-ratio: 16 / 9; background: #000; border-radius: 8px; overflow: hidden; border: 1px solid #333; }
        .slider-container { display: flex; width: 100%; height: 100%; transition: transform 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94); }
        .slide-img { width: 100%; height: 100%; object-fit: contain; flex-shrink: 0; }
        
        .slider-arrow { position: absolute; top:50%; transform: translateY(-50%); background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color:#fff; width:50px; height:50px; border-radius:50%; display:flex; justify-content:center; align-items:center; cursor:pointer; font-size:18px; transition: background 0.3s; }
        .slider-arrow:hover { background: rgba(255,255,255,0.3); }
        .arrow-left { left: 20px; }
        .arrow-right { right: 20px; }

        @media (max-width: 768px) { .gate-container { padding-left: 0; width: 100%; } .social-icons { gap: 25px; } .main-logo { max-width: 280px; } .projects-grid { grid-template-columns: 1fr; } .slider-wrapper { aspect-ratio: 4/3; } .modal-text h3 { font-size: 22px; } #intro-loader { display: block; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; } #intro-loader video { width: 100%; height: 100%; object-fit: cover; } }
    </style>
</head>
<body class="scroll-locked">

    <div id="intro-loader">
        <button id="volume-btn" class="volume-control-btn"><i class="fas fa-volume-mute"></i> تشغيل الصوت</button>
        <video id="intro-video" src="intro.mp4" autoplay muted playsinline></video>
    </div>

    <div class="main-background"></div>
    <div class="overlay"></div>

    <div class="gate-container">
        <div class="social-icons">
            <a href="https://www.facebook.com/evodev.art/" target="_blank"><i class="fab fa-facebook-f"></i></a>
            <a href="https://www.instagram.com/evodev.art/" target="_blank"><i class="fab fa-instagram"></i></a>
            <a href="https://www.tiktok.com/@evodev.art/" target="_blank"><i class="fab fa-tiktok"></i></a>
            <a href="https://behance.com/evodevart/" target="_blank"><i class="fab fa-behance"></i></a>
            <a href="https://www.linkedin.com/in/evodevart" target="_blank"><i class="fab fa-linkedin-in"></i></a>
            <a href="https://wa.me/201222210237" target="_blank"><i class="fab fa-whatsapp"></i></a>
        </div>
        <div class="main-logo-wrapper" id="enter-trigger">
            <img src="logo.png" alt="EVO Development Logo" class="main-logo">
            <center><div class="click-hint">اضغط لاستكشاف المشاريع</div></center>
        </div>
    </div>

    <section class="portfolio-section">
        <div class="section-header">
            <h2>Our Portfolio</h2>
            <p> </p>
        </div>
        <div class="projects-grid" id="portfolio-grid"></div>
    </section>

    <div class="project-modal" id="project-modal">
        <button class="modal-close-btn" id="modal-close">&times;</button>
        <div class="modal-content">
            <div class="slider-wrapper">
                <div class="slider-container" id="modal-slider"></div>
                <button class="slider-arrow arrow-left" id="slide-left"><i class="fas fa-chevron-left"></i></button>
                <button class="slider-arrow arrow-right" id="slide-right"><i class="fas fa-chevron-right"></i></button>
            </div>
            <div class="modal-text">
                <h3 id="modal-title"></h3>
                <p id="modal-desc"></p>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const videoLoader = document.getElementById("intro-loader");
            const videoElement = document.getElementById("intro-video");
            const gateContainer = document.querySelector(".gate-container");
            const volumeBtn = document.getElementById("volume-btn");
            const enterTrigger = document.getElementById("enter-trigger");
            
            const modal = document.getElementById("project-modal");
            const modalSlider = document.getElementById("modal-slider");
            const modalTitle = document.getElementById("modal-title");
            const modalDesc = document.getElementById("modal-desc");
            
            let allProjects = [];
            let currentSlideIndex = 0;

            // جلب المشاريع ديناميكياً
            fetch('projects-1.json')
                .then(res => res.json())
                .then(data => {
                    allProjects = data.projects || [];
                    const grid = document.getElementById('portfolio-grid');
                    allProjects.forEach((proj, index) => {
                        // الصورة الأولى هي غلاف الكارت من بره
                        const coverImg = proj.images && proj.images.length > 0 ? proj.images[0] : 'bg.jpg';
                        grid.innerHTML += `
                            <div class="project-card" onclick="openProject(${index})">
                                <img src="${coverImg}" class="project-img" alt="${proj.title}">
                                <div class="project-info">
                                    <h4>${proj.title}</h4>
                                    <p>${proj.description}</p>
                                </div>
                            </div>`;
                    });
                });

            // فتح تفاصيل المشروع والألبوم
            window.openProject = (index) => {
                const project = allProjects[index];
                modalTitle.innerText = project.title;
                modalDesc.innerText = project.description;
                
                // توليد الصور داخل السلايدر
                modalSlider.innerHTML = "";
                project.images.forEach(imgUrl => {
                    modalSlider.innerHTML += `<img src="${imgUrl}" class="slide-img">`;
                });
                
                currentSlideIndex = 0;
                updateSliderPosition();
                modal.classList.add("active");
                document.body.style.overflow = "hidden"; // قفل سكرول الموقع الخلفي
            };

            // تحريك السلايدر
            const updateSliderPosition = () => {
                modalSlider.style.transform = `translateX(-${currentSlideIndex * 100}%)`;
            };

            document.getElementById("slide-right").addEventListener("click", () => {
                if (currentSlideIndex < modalSlider.children.length - 1) {
                    currentSlideIndex++;
                    updateSliderPosition();
                }
            });

            document.getElementById("slide-left").addEventListener("click", () => {
                if (currentSlideIndex > 0) {
                    currentSlideIndex--;
                    updateSliderPosition();
                }
            });

            // إغلاق النافذة
            document.getElementById("modal-close").addEventListener("click", () => {
                modal.classList.remove("active");
                document.body.style.overflow = "auto";
            });

            // كود الصوت والإنترو المعتاد
            volumeBtn.addEventListener("click", (e) => {
                e.stopPropagation();
                videoElement.muted = !videoElement.muted;
                volumeBtn.innerHTML = videoElement.muted ? '<i class="fas fa-volume-mute"></i> تشغيل الصوت' : '<i class="fas fa-volume-up"></i> كتم الصوت';
            });

            const revealGate = () => {
                videoLoader.style.opacity = '0';
                gateContainer.classList.add("start-anim");
                setTimeout(() => { videoLoader.style.display = 'none'; videoElement.pause(); }, 800);
            };

            if (window.innerWidth <= 768) {
                videoElement.onended = revealGate;
                setTimeout(revealGate, 15000);
            } else { revealGate(); }

            enterTrigger.addEventListener("click", () => {
                document.body.classList.remove("scroll-locked");
                document.body.classList.add("scroll-allowed");
                document.body.classList.add("gate-revealed");
            });
        });
    </script>
</body>
</html>
